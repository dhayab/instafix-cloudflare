name = "instafix"
main = "src/index.ts"
compatibility_date = "2026-04-18"
compatibility_flags = ["nodejs_compat"]

# Disable the auto-generated per-version preview URLs. Each version would
# otherwise be reachable at a public `<version>-<worker>.<subdomain>.workers.dev`,
# which widens the attack surface for a public-URL service with no benefit.
preview_urls = false

# Resource-name convention: all shared-namespace resources are prefixed
# `instafix-`. The Worker-local binding name stays short.
#
# KV id is public (visible in the Cloudflare dashboard) — committing it is
# fine and keeps `wrangler deploy` working out of the box. Terraform still
# owns the lifecycle; if the namespace is recreated, update this one line.
# `wrangler dev` uses file-backed local state and ignores the id anyway.
[[kv_namespaces]]
binding = "POSTS_CACHE"
id = "b960d3b179564ebcb400f6e45ddd8317"

# R2: generated grid JPEGs and play-overlay thumbnails. Local dev uses a
# filesystem-backed stub regardless of bucket_name. Create for real with:
# wrangler r2 bucket create instafix-grids
[[r2_buckets]]
binding = "GRIDS"
bucket_name = "instafix-grids"

# Cloudflare Images binding (reserved for future offload; Photon is primary)
# [images]
# binding = "IMAGES"

# Secrets (set via `wrangler secret put`):
#   CF_ACCOUNT_ID          — for Browser Rendering /content fallback
#   CF_BROWSER_API_TOKEN   — Bearer token, scope: "Browser Rendering - Edit"

# Browser Rendering hard cap — see src/scraper/br-cap.ts.
# Counted in BR API calls. ~300/day ≈ 20 min/day ≈ the 10h/mo free tier.
# Override per-environment at deploy time if needed.
[vars]
BR_DAILY_CAP = "300"

[observability]
enabled = true
